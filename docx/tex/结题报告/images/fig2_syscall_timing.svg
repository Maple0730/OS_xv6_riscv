<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680">
  <rect width="1000" height="680" fill="#FFFFFF"/>

  <text x="500" y="28" text-anchor="middle" font-family="SimHei,sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">系统调用全链路时序图 — write(1, "hello", 5)</text>
  <line x1="270" y1="36" x2="730" y2="36" stroke="#E8A817" stroke-width="2"/>

  <!-- ===== Participant headers ===== -->
  <!-- 6 columns at: 50, 200, 360, 520, 690, 870  (gaps: 150,160,160,170,180) -->

  <rect x="10" y="50" width="100" height="32" rx="3" fill="#10B981"/>
  <text x="60" y="70" text-anchor="middle" font-family="SimHei,sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">用户程序</text>

  <rect x="155" y="50" width="100" height="32" rx="3" fill="#E8A817"/>
  <text x="205" y="70" text-anchor="middle" font-family="SimHei,sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">usys.S</text>

  <rect x="310" y="50" width="100" height="32" rx="3" fill="#3A7BD5"/>
  <text x="360" y="70" text-anchor="middle" font-family="SimHei,sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">trampoline.S</text>

  <rect x="470" y="50" width="100" height="32" rx="3" fill="#1A3A5C"/>
  <text x="520" y="70" text-anchor="middle" font-family="SimHei,sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">trap.c</text>

  <rect x="640" y="50" width="110" height="32" rx="3" fill="#6B7280"/>
  <text x="695" y="70" text-anchor="middle" font-family="SimHei,sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">syscall/file</text>

  <rect x="820" y="50" width="100" height="32" rx="3" fill="#9CA3AF"/>
  <text x="870" y="70" text-anchor="middle" font-family="SimHei,sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">用户程序</text>

  <!-- Lifelines -->
  <line x1="60" y1="82" x2="60" y2="640" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="205" y1="82" x2="205" y2="640" stroke="#E8A817" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="360" y1="82" x2="360" y2="640" stroke="#3A7BD5" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="520" y1="82" x2="520" y2="640" stroke="#1A3A5C" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="695" y1="82" x2="695" y2="640" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="870" y1="82" x2="870" y2="640" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ===== Step 1: write() call → ecall ===== -->
  <line x1="60" y1="105" x2="200" y2="105" stroke="#10B981" stroke-width="2"/>
  <polygon points="194,101 204,105 194,109" fill="#10B981"/>
  <text x="140" y="99" text-anchor="middle" font-family="Consolas,monospace" font-size="11" fill="#065F46">write(1,"hello",5)</text>

  <rect x="190" y="116" width="160" height="50" rx="4" fill="#FFFBEB" stroke="#E8A817" stroke-width="1.5"/>
  <text x="270" y="133" text-anchor="middle" font-family="Consolas,monospace" font-size="12" font-weight="bold" fill="#92400E">1. ecall 陷入</text>
  <text x="270" y="148" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#6B7280">li a7, SYS_write; ecall</text>
  <text x="270" y="161" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="9" fill="#9CA3AF">scause←8, stvec→TRAMPOLINE</text>

  <line x1="205" y1="166" x2="355" y2="188" stroke="#E8A817" stroke-width="1.5"/>
  <polygon points="349,184 359,188 349,192" fill="#E8A817"/>

  <!-- ===== Step 2: uservec ===== -->
  <rect x="345" y="196" width="160" height="50" rx="4" fill="#EFF6FF" stroke="#3A7BD5" stroke-width="1.5"/>
  <text x="425" y="213" text-anchor="middle" font-family="Consolas,monospace" font-size="12" font-weight="bold" fill="#1D4ED8">2. uservec</text>
  <text x="425" y="228" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#6B7280">保存32寄存器→trapframe</text>
  <text x="425" y="241" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="9" fill="#9CA3AF">切内核页表→usertrap()</text>

  <line x1="360" y1="246" x2="515" y2="268" stroke="#3A7BD5" stroke-width="1.5"/>
  <polygon points="509,264 519,268 509,272" fill="#3A7BD5"/>

  <!-- ===== Step 3: usertrap() ===== -->
  <rect x="505" y="274" width="160" height="50" rx="4" fill="#F0F4F8" stroke="#1A3A5C" stroke-width="1.5"/>
  <text x="585" y="291" text-anchor="middle" font-family="Consolas,monospace" font-size="12" font-weight="bold" fill="#1A3A5C">3. usertrap()</text>
  <text x="585" y="306" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#6B7280">读scause=8→系统调用</text>
  <text x="585" y="319" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="9" fill="#9CA3AF">epc+=4, intr_on→syscall()</text>

  <line x1="520" y1="324" x2="690" y2="346" stroke="#1A3A5C" stroke-width="1.5"/>
  <polygon points="684,342 694,346 684,350" fill="#1A3A5C"/>

  <!-- ===== Step 4: syscall() dispatch ===== -->
  <rect x="680" y="352" width="160" height="50" rx="4" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.5"/>
  <text x="760" y="369" text-anchor="middle" font-family="Consolas,monospace" font-size="12" font-weight="bold" fill="#374151">4. syscall() 分发</text>
  <text x="760" y="384" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#6B7280">trapframe→a7 = 16</text>
  <text x="760" y="397" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="9" fill="#9CA3AF">syscalls[16]→sys_write</text>

  <!-- ===== Step 5: sys_write() ===== -->
  <line x1="695" y1="402" x2="525" y2="432" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="530,428 520,432 530,436" fill="#10B981"/>

  <rect x="505" y="440" width="160" height="50" rx="4" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="585" y="457" text-anchor="middle" font-family="Consolas,monospace" font-size="12" font-weight="bold" fill="#065F46">5. sys_write() 执行</text>
  <text x="585" y="472" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#6B7280">argfd→struct file*</text>
  <text x="585" y="485" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="9" fill="#9CA3AF">filewrite→uartwrite</text>

  <line x1="520" y1="490" x2="365" y2="512" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="370,508 360,512 370,516" fill="#10B981"/>

  <!-- ===== Step 6: usertrapret() ===== -->
  <rect x="345" y="520" width="160" height="50" rx="4" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="425" y="537" text-anchor="middle" font-family="Consolas,monospace" font-size="12" font-weight="bold" fill="#065F46">6. usertrapret()</text>
  <text x="425" y="552" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#6B7280">关中断, SPP←0</text>
  <text x="425" y="565" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="9" fill="#9CA3AF">设stvec, sepc→epc</text>

  <line x1="360" y1="570" x2="210" y2="592" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="215,588 205,592 215,596" fill="#10B981"/>

  <!-- ===== Step 7: userret → sret ===== -->
  <rect x="190" y="598" width="160" height="44" rx="4" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="270" y="615" text-anchor="middle" font-family="Consolas,monospace" font-size="12" font-weight="bold" fill="#065F46">7. userret → sret</text>
  <text x="270" y="630" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#6B7280">恢复寄存器, 切用户页表</text>
  <text x="270" y="642" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="9" fill="#9CA3AF">sret→U-mode</text>

  <!-- Legend -->
  <text x="500" y="672" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#9CA3AF">绿=用户态 | 黄=ecall | 蓝=页表切换 | 深蓝=trap分发 | 灰=syscall执行 | 绿虚线=返回</text>
</svg>
