<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <rect x="84" y="54" width="112" height="6" fill="#1E3A8A"/>
  <text x="84" y="112" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="34" font-weight="700" fill="#1E3A8A">个人负责范围与汇报结构</text>
  <text x="84" y="150" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="18" fill="#4B5563">三个模块，统一按“框架、基础、扩展、测试”四层展开</text>
  <text x="1160" y="82" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="16" fill="#6B7280">02</text>

  <rect x="84" y="202" width="344" height="250" fill="#F4F7FB" stroke="#D7E0EC"/>
  <rect x="468" y="202" width="344" height="250" fill="#F4F7FB" stroke="#D7E0EC"/>
  <rect x="852" y="202" width="344" height="250" fill="#F4F7FB" stroke="#D7E0EC"/>

  <use data-icon="tabler-outline/home-2" x="112" y="228" width="34" height="34" fill="#1E3A8A" stroke-width="2"/>
  <use data-icon="tabler-outline/cpu-2" x="496" y="228" width="34" height="34" fill="#1E3A8A" stroke-width="2"/>
  <use data-icon="tabler-outline/folder-open" x="880" y="228" width="34" height="34" fill="#1E3A8A" stroke-width="2"/>

  <text x="160" y="255" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="28" font-weight="700" fill="#111827">系统启动</text>
  <text x="544" y="255" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="28" font-weight="700" fill="#111827">内存系统</text>
  <text x="928" y="255" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="28" font-weight="700" fill="#111827">文件系统</text>

  <text x="112" y="302" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="18" fill="#4B5563">
    <tspan x="112" dy="0">- 启动入口与特权级切换</tspan>
    <tspan x="112" dy="30">- DTB 指针保存</tspan>
    <tspan x="112" dy="30">- shell 默认进入 /desktop</tspan>
    <tspan x="112" dy="30">- 启动日志与验证</tspan>
  </text>

  <text x="496" y="302" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="18" fill="#4B5563">
    <tspan x="496" dy="0">- 运行时物理内存探测</tspan>
    <tspan x="496" dy="30">- Sv39 页表与 lazy sbrk</tspan>
    <tspan x="496" dy="30">- kmalloc/kmfree 两级架构</tspan>
    <tspan x="496" dy="30">- 主路径回归测试</tspan>
  </text>

  <text x="880" y="302" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="18" fill="#4B5563">
    <tspan x="880" dy="0">- 文件描述符与路径解析</tspan>
    <tspan x="880" dy="30">- lseek 文件定位</tspan>
    <tspan x="880" dy="30">- 双独立磁盘与 /disk1</tspan>
    <tspan x="880" dy="30">- 隐藏与颜色显示</tspan>
  </text>

  <rect x="84" y="500" width="1112" height="140" fill="#FFFFFF" stroke="#D7E0EC"/>
  <text x="112" y="542" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="22" font-weight="700" fill="#111827">答辩重点</text>
  <text x="112" y="580" font-family='"Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif' font-size="18" fill="#4B5563">
    <tspan x="112" dy="0">先对齐课程要求，再说明本人在 xv6 原有能力之外补充了什么，最后用真实测试结果证明这些扩展已经跑通。</tspan>
    <tspan x="112" dy="30">整套汇报不把 xv6 原版能力说成从零实现，而是强调“理解、扩展、验证”三步。</tspan>
  </text>
</svg>
