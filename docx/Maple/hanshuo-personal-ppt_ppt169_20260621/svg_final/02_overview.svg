  <text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="112" y="302">- 启动入口与特权级切换</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="112" y="332">- DTB 指针保存</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="112" y="362">- shell 默认进入 /desktop</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="112" y="392">- 启动日志与验证</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="496" y="302">- 运行时物理内存探测</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="496" y="332">- Sv39 页表与 lazy sbrk</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="496" y="362">- kmalloc/kmfree 两级架构</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="496" y="392">- 主路径回归测试</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="880" y="302">- 文件描述符与路径解析</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="880" y="332">- lseek 文件定位</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="880" y="362">- 双独立磁盘与 /disk1</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="880" y="392">- 隐藏与颜色显示</text><rect x="84" y="500" width="1112" height="140" fill="#FFFFFF" stroke="#D7E0EC" />
  <text x="112" y="542" font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">答辩重点</text>
  <text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="112" y="580">先对齐课程要求，再说明本人在 xv6 原有能力之外补充了什么，最后用真实测试结果证明这些扩展已经跑通。</text><text font-family="&quot;Microsoft YaHei&quot;, &quot;Noto Sans CJK SC&quot;, Arial, sans-serif" font-size="18" fill="#4B5563" x="112" y="610">整套汇报不把 xv6 原版能力说成从零实现，而是强调“理解、扩展、验证”三步。</text></svg>